type: custom:ha-lcars-panel
vars:
  lcars_unit: 2vw
remoteRoot: /ha-lcars-panel/demo
nav:
  - text: Home
  - text: Config
    children:
      - text: Globals
      - text: Variables
      - text: Themes
      - text: Mixins
      - text: Positioning
      - text: Children
      - text: Remote
  - text: Layout
    children:
      - text: Unit
      - text: Flex
      - text: Absolute
      - text: Alignment
      - text: Spacing
      - text: Orientation
  - text: Elements
    children:
      - text: Element
      - text: Color
      - text: Size
      - text: Text
      - text: Alignment
      - text: Curves
  - text: Panels
    children:
      - text: Types
      - text: Children
      - text: Caps
      - text: Title
  - key: nav
    text: Navigation
    children:
      - text: Local
      - text: Browser
  - key: state
    text: HA State
    children:
      - text: Value
      - text: Color
      - text: List
      - text: Table
      - text: Scale
  - text: Actions
    children:
      - text: Tap
      - text: Action
mixins:
  myText:
    type: el
    fontSize: 0.4
    alignContent: bottom-right
    height: 2
    width: 3
    radXTopLeft: 1
    radXBottomLeft: 1
  myMixin:
    color: orange-peel
  menuTab:
    type: el
    alignContent: middle-center
    width: 3
    textColor: black
children:
  - type: panel-tl
    color: golden-tainoi
    fillWidth: true
    fillHeight: true
    leftColor: golden-tainoi
    leftPad: 1
    leftWidth: 4
    leftChildren:
      - type: menu-vertical
        width: 4
        height: 1
        navToFirstChild: true
    children:
      - type: nav-remote
        rootPath: /
