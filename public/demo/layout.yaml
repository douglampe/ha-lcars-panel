children:
  - tag: p
    text: |
      The layout system is based on LCARS Units. This is a 1 unit x 1 unit square:
  - type: el
    width: 1
    height: 1
    color: golden-tainoi
  - type: md
    content: |
      The layout system uses the ["flexbox" CSS layout](https://css-tricks.com/snippets/css/a-guide-to-flexbox/) 
      meaning items are flexibly displayed in rows and columns.

      To create a row, set the `type` to `row`.

      ```
      children:
        - type: row
      ```

      Any children added to a column will be arranged horizontally.

  - type: row
    children:
      - tag: pre
        text: |
          - type: row
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                height: 1
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue
      - type: col
        marginLeft: 1
        children:
          - type: row
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                height: 1
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue

  - type: sample
    content: |
      To create a column, set the `type` to `col`.

      ```
      children:
        - type: col
      ```

      Any children added to a row will be arranged vertically.
    configYaml: |
      - type: col
        children:
          - type: el
            width: 1
            height: 1
            color: atomic-tangerine
          - type: el
            width: 1
            height: 1
            color: indian-red
          - type: el
            width: 1
            height: 1
            color: dodger-blue

  - type: sample
    content: |
      As shown above, there is no spacing between children of rows or columns by default. To add a consistent gap
      between all children, set the `gap` key. The gap size is 0.1 unit so `gap: 1` would set the gap size to 1/10
      of a unit.
    configYaml: |
      - type: row
        gap: 1
        children:
          - type: el
            width: 1
            height: 1
            color: atomic-tangerine
          - type: el
            width: 1
            height: 1
            color: indian-red
          - type: el
            width: 1
            height: 1
            color: dodger-blue

  - type: sample
    content: |
      Items in a row are aligned to the top of the row by default so items of varying sizes will be aligned to the
      top of the tallest item.
    configYaml: |
      - type: row
        gap: 1
        children:
          - type: el
            width: 1
            height: 2
            color: atomic-tangerine
          - type: el
            width: 1
            height: 0.5
            color: indian-red
          - type: el
            width: 1
            height: 1
            color: dodger-blue

  - type: sample
    content: |
      To align items to the bottom of the row, set the `bottom` key to `true`.
    configYaml: |
      - type: row
        gap: 1
        bottom: true
        children:
          - type: el
            width: 1
            height: 2
            color: atomic-tangerine
          - type: el
            width: 1
            height: 0.5
            color: indian-red
          - type: el
            width: 1
            height: 1
            color: dodger-blue

  - type: sample
    content: |
      Similarly, column items are aligned to the left by default. To align items to the right of the column, set
      the `right` key to `true`.
    configYaml: |
      - type: col
        gap: 1
        style:
          width: calc(var(--lcars-unit) * 3)
        children:
          - type: row
            children:
              - type: el
                width: 3
                height: 1
                color: atomic-tangerine
          - type: row
            right: true
            gap: 1
            children:
              - type: el
                width: 1
                height: 1
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue

  - type: sample
    content: |
      To stretch any item without a specified height to fill the available height in the row, set `stretch` to 
      `true`.
    configYaml: |
      - type: row
        gap: 1
        stretch: true
        children:
          - type: el
            width: 1
            height: 2
            color: atomic-tangerine
          - type: el
            width: 1
            color: indian-red
          - type: el
            width: 1
            color: dodger-blue

  - type: sample
    content: |
      By default, there are no margins between rows.
    configYaml: |
      - type: row
        gap: 1
        children:
          - type: el
            width: 1
            height: 1
            color: atomic-tangerine
          - type: el
            width: 1
            height: 1
            color: indian-red
          - type: el
            width: 1
            height: 1
            color: dodger-blue
      - type: row
        gap: 1
        stretch: true
        children:
          - type: el
            width: 1
            height: 1
            color: golden-tainoi
          - type: el
            width: 1
            color: lilac
          - type: el
            width: 1
            color: fiery-orange

  - type: sample
    content: |
      Margins can be added above, below, or on either side of a row with `marginTop`, `marginBottom`, `marginLeft`,
      and `marginRight`.
    configYaml: |
      - type: row
        gap: 1
        marginBottom: 1
        stretch: true
        children:
          - type: el
            width: 1
            height: 1
            color: atomic-tangerine
          - type: el
            width: 1
            color: indian-red
          - type: el
            width: 1
            color: dodger-blue
      - type: row
        gap: 1
        stretch: true
        children:
          - type: el
            width: 1
            height: 1
            color: golden-tainoi
          - type: el
            width: 1
            color: lilac
          - type: el
            width: 1
            color: fiery-orange

  - type: sample
    content: |
      Padding can be added inside the border of the row using `padTop`, `padBottom`, `padLeft`, and `padRight` or
      set the same padding on all sides with `pad`.
    configYaml: |
      - type: el
        color: golden-tainoi
        children:
          - type: row
            pad: 1
            fill: false
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                color: indian-red
              - type: el
                width: 1
                color: dodger-blue

  - type: pill
    color: atomic-tangerine
    text: elements
    nav: /demo/elements
