children:
  - type: col
    marginTop: 1
    marginLeft: 1
    gap: 10
    children:
      - type: md
        content: |
          The layout system uses the ["flexbox" CSS layout](https://css-tricks.com/snippets/css/a-guide-to-flexbox/) 
          meaning items can be flexibly displayed in rows and columns.

          To create a row, set the `type` to `row`. Any children added to a row will be arranged horizontally.

      - type: sample
        content: ''
        configYaml: |
          - type: row
            children:
              - type: el
                height: 1
                width: 1
                color: atomic-tangerine
              - type: el
                height: 1
                width: 1
                color: indian-red
              - type: el
                height: 1
                width: 1
                color: dodger-blue

      - type: sample
        content: |
          To create a column, set the `type` to `col`. Any children added to a column will be arranged vertically.
        configYaml: |
          - type: col
            children:
              - type: el
                height: 1
                width: 1
                color: atomic-tangerine
              - type: el
                height: 1
                width: 1
                color: indian-red
              - type: el
                height: 1
                width: 1
                color: dodger-blue

      - type: sample
        content: |
          To make child elements stretch to fill the available height of a row or width of a column, set `stretch` to
          `true`.
        configYaml: |
          - type: row
            stretch: true
            height: 1
            children:
              - type: el
                width: 1
                color: atomic-tangerine
              - type: el
                width: 1
                color: indian-red
              - type: el
                width: 1
                color: dodger-blue

      - type: sample
        content: |
          To make child elements fill the available horizontal space in a row or vertical space in a column, set `fill`
          to `true` on the element.
        configYaml: |
          - type: row
            stretch: true
            height: 1
            width: 10
            children:
              - type: el
                width: 1
                color: atomic-tangerine
              - type: el
                fill: true
                color: indian-red
              - type: el
                width: 1
                color: dodger-blue

  - type: el
    marginTop: 1
    marginLeft: 1
    marginBottom: 1
    children:
      - type: md
        content: |
          The primary container is a column configured to fill all available space and stretch children to its width.
          Therefore, any elements placed directly in the primary container will be arranged vertically and will fill 
          the available width.
          ```
          type: custom:ha-lcars-layout
          children:
            - type: el
              color: 1
              textColor: black
              text: This element will fill the viewport width.
            - type: el
              color: 2
              textColor: black
              text: This element will fill the viewport width.
          ```
  - type: el
    color: 1
    textColor: black
    text: This element will fill the viewport width.
  - type: el
    color: 2
    textColor: black
    text: This element will fill the viewport width.
  - type: el
    marginTop: 1
    marginLeft: 1
    marginBottom: 1
    children:
      - type: md
        content: |
          To make elements placed in the top-level container shrink to the size of their content, wrap them in a 
          column.
          ```
          type: custom:ha-lcars-layout
          children:
            - type: col
              children:
              - type: el
                color: 1
                textColor: black
                text: This element resizes to fit its content.
              - type: el
                color: 2
                textColor: black
                text: This element resizes to fit its content.
          ```
  - type: col
    children:
      - type: el
        color: 1
        textColor: black
        text: This element resizes to fit its content.
      - type: el
        color: 2
        textColor: black
        text: This element resizes to fit its content.
      - type: md
        content: |
          or row (type: `row`).
          ```
          type: custom:ha-lcars-layout
          children:
            - type: row
              children:
              - type: el
                color: 1
                textColor: black
                text: This element resizes to fit its content.
              - type: el
                color: 2
                textColor: black
                text: This element resizes to fit its content.
          ```
      - type: row
        children:
          - type: el
            color: 1
            textColor: black
            text: This element resizes to fit its content.
          - type: el
            color: 2
            textColor: black
            text: This element resizes to fit its content.

      - type: sample
        content: |
          Items in a row are aligned to the top of the row by default so items of varying sizes will be aligned to the
          top of the tallest item.
        configYaml: |
          - type: row
            gap: 1
            children:
              - type: el
                width: 1
                height: 2
                color: atomic-tangerine
              - type: el
                width: 1
                height: 0.5
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue

      - type: sample
        content: |
          To align items to the bottom of the row, set the `bottom` key to `true`.
        configYaml: |
          - type: row
            gap: 1
            bottom: true
            children:
              - type: el
                width: 1
                height: 2
                color: atomic-tangerine
              - type: el
                width: 1
                height: 0.5
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue

      - type: sample
        content: |
          Similarly, column items are aligned to the left by default. To align items to the right of the column, set
          the `right` key to `true`.
        configYaml: |
          - type: col
            gap: 1
            style:
              width: calc(var(--lcars-unit) * 3)
            children:
              - type: row
                children:
                  - type: el
                    width: 3
                    height: 1
                    color: atomic-tangerine
              - type: row
                right: true
                gap: 1
                children:
                  - type: el
                    width: 1
                    height: 1
                    color: indian-red
                  - type: el
                    width: 1
                    height: 1
                    color: dodger-blue

      - type: sample
        content: |
          To stretch any item without a specified height to fill the available height in the row, set `stretch` to 
          `true`.
        configYaml: |
          - type: row
            gap: 1
            stretch: true
            children:
              - type: el
                width: 1
                height: 2
                color: atomic-tangerine
              - type: el
                width: 1
                color: indian-red
              - type: el
                width: 1
                color: dodger-blue

      - type: sample
        content: |
          There is no spacing between children of rows or columns by default. To add a consistent gap between all 
          children, set the `gap` key. The gap size is 0.1 unit so `gap: 1` would set the gap size to 1/10 of a 
          unit.
        configYaml: |
          - type: row
            gap: 1
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                height: 1
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue
      - type: sample
        content: |
          By default, there are no margins between rows.
        configYaml: |
          - type: row
            gap: 1
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                height: 1
                color: indian-red
              - type: el
                width: 1
                height: 1
                color: dodger-blue
          - type: row
            gap: 1
            stretch: true
            children:
              - type: el
                width: 1
                height: 1
                color: golden-tainoi
              - type: el
                width: 1
                color: lilac
              - type: el
                width: 1
                color: fiery-orange

      - type: sample
        content: |
          Margins can be added above, below, or on either side of a row with `marginTop`, `marginBottom`, `marginLeft`,
          and `marginRight`.
        configYaml: |
          - type: row
            gap: 1
            marginBottom: 1
            stretch: true
            children:
              - type: el
                width: 1
                height: 1
                color: atomic-tangerine
              - type: el
                width: 1
                color: indian-red
              - type: el
                width: 1
                color: dodger-blue
          - type: row
            gap: 1
            stretch: true
            children:
              - type: el
                width: 1
                height: 1
                color: golden-tainoi
              - type: el
                width: 1
                color: lilac
              - type: el
                width: 1
                color: fiery-orange

      - type: sample
        content: |
          Padding can be added inside the border of the row using `padTop`, `padBottom`, `padLeft`, and `padRight` or
          set the same padding on all sides with `pad`.
        configYaml: |
          - type: el
            color: golden-tainoi
            children:
              - type: row
                pad: 1
                fill: false
                children:
                  - type: el
                    width: 1
                    height: 1
                    color: atomic-tangerine
                  - type: el
                    width: 1
                    color: indian-red
                  - type: el
                    width: 1
                    color: dodger-blue

  - type: pill
    text: 'Next: Panels'
    nav: /demo/panels
