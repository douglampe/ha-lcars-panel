children:
  - type: col
    mixin: pageWrapper
    children:
      - type: sample
        content: |
          You can call services when any item is tapped by adding an `tapAction` key.
        configYaml: |
          - type: row
            bottom: true
            children:
              - type: pill
                color: golden-tainoi
                text: Toggle Light
                width: 4
                margin-right: 0.1
                tapAction:
                  action: call-service
                  service: light.toggle
                  data:
                    entity_id: light.test
              - type: text
                text_template: Light is {{ states('light.test') }}

      - type: sample
        content: |
          On desktop devices, the pointer will be changed to show that an element is clickable if you
          set `button` to `true`.
        configYaml: |
          - type: el
            width: 4
            height: 1
            fontSize: 0.5
            textColor: black
            alignContent: middle-center
            color: golden-tainoi
            capRight: true
            capLeft: true
            button: true
            text: button

  - type: pill
    nav: /demo/cards
    marginTop: 1
    marginLeft: 1
    text: 'Next: Cards'
    width: 4
