children:
  - type: col
    marginTop: 1
    marginLeft: 1
    gap: 10
    children:
      - type: md
        content: |
          Panels are containers with rounded "elbow" corners. Panels can have 1, 2, or 4 elbows depending on their
          orientation. For example, you can have a panel with a single elbow in the top-left corner using `panel-tl`.
          The following panel types are supported:

      - type: row
        gap: 10
        wrap: true
        children:
          - type: sample
            configYaml: |
              - type: panel-tl
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-bl
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-tr
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-br
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-t
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-b
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-l
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-r
                color: dodger-blue
                children:
                  - text: content
          - type: sample
            configYaml: |
              - type: panel-all
                color: dodger-blue
                children:
                  - text: content

      - type: md
        content: |
          You can add elements to the sides of a panel with `leftChildren`, `rightChildren`, `topChildren`, and
          `bottomChildren`.

      - type: row
        wrap: true
        gap: 10
        children:
          - type: sample
            configYaml: |
              - type: panel-tl
                color: dodger-blue
                children:
                  - text: content
                leftChildren:
                  - type: el
                    color: golden-tainoi
                    height: 1

          - type: sample
            configYaml: |
              - type: panel-tl
                color: dodger-blue
                children:
                  - text: content
                topChildren:
                  - type: el
                    color: golden-tainoi
                    width: 4

          - type: sample
            configYaml: |
              - type: panel-bl
                color: dodger-blue
                children:
                  - text: content
                leftChildren:
                  - type: el
                    color: golden-tainoi
                    height: 1

          - type: sample
            configYaml: |
              - type: panel-bl
                color: dodger-blue
                children:
                  - text: content
                bottomChildren:
                  - type: el
                    color: golden-tainoi
                    width: 4

          - type: sample
            configYaml: |
              - type: panel-tr
                color: dodger-blue
                children:
                  - text: content
                rightChildren:
                  - type: el
                    color: golden-tainoi
                    height: 1

          - type: sample
            configYaml: |
              - type: panel-tr
                color: dodger-blue
                children:
                  - text: content
                topChildren:
                  - type: el
                    color: golden-tainoi
                    width: 4

          - type: sample
            configYaml: |
              - type: panel-br
                color: dodger-blue
                children:
                  - text: content
                rightChildren:
                  - type: el
                    color: golden-tainoi
                    height: 1

          - type: sample
            configYaml: |
              - type: panel-br
                color: dodger-blue
                children:
                  - text: content
                bottomChildren:
                  - type: el
                    color: golden-tainoi
                    width: 4

      - type: sample
        content: |
          You can add rounded caps to the end of a panel with `topCap` or `bottomCap`
        configYaml: |
          - type: panel-tl
            color: dodger-blue
            topCap: true
            bottomCap: true
            children:
              - type: el
                width: 4
                height: 4
                text: content

      - type: sample
        content: |
          You can add a title to the top or bottom using `title`
        configYaml: |
          - type: panel-tl
            color: dodger-blue
            title: Title
            children:
              - type: el
                width: 4
                text: content
