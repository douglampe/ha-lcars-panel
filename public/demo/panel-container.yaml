children:
  - type: el
    marginTop: 1
    marginLeft: 1
    marginBottom: 1
    children:
      - type: md
        content: |
          The primary container for your LCARS panel fills the available viewport width and height to allow elements
          placed directly in it to fill the width and height. By default, top-level children will fill the width
          of the container.
          ```
          type: custom:ha-lcars-layout
          children:
            - type: el
              color: 1
              textColor: black
              text: This element will fill the viewport width.
          ```
  - type: el
    color: 1
    textColor: black
    text: This element will fill the viewport width.
  - type: el
    marginTop: 1
    marginLeft: 1
    marginBottom: 1
    children:
      - type: md
        content: |
          To make elements shrink to the size of their content, wrap the element in a column (type: `col`).
          ```
          type: custom:ha-lcars-layout
          children:
            - type: col
              children:
              - type: el
                color: 1
                textColor: black
                text: This element resizes to fit its content.
              - type: el
                color: 2
                textColor: black
                text: This element resizes to fit its content.
          ```
      - type: col
        children:
          - type: el
            color: 1
            textColor: black
            text: This element resizes to fit its content.
          - type: el
            color: 2
            textColor: black
            text: This element resizes to fit its content.
      - type: md
        content: |
          or row (type: `row`).
          ```
          type: custom:ha-lcars-layout
          children:
            - type: row
              children:
              - type: el
                color: 1
                textColor: black
                text: This element resizes to fit its content.
              - type: el
                color: 2
                textColor: black
                text: This element resizes to fit its content.
          ```
      - type: row
        children:
          - type: el
            color: 1
            textColor: black
            text: This element resizes to fit its content.
          - type: el
            color: 2
            textColor: black
            text: This element resizes to fit its content.
