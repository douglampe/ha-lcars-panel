children:
  - type: md
    content: |
      # LCARS Row

      Type: `row`

      ## Properties

  - type: lcars-table
    children:
      - tag: tr
        children:
          - tag: th
            text: Property
          - tag: th
            text: Description
      - tag: tr
        children:
          - tag: td
            md: '`bottom`'
          - tag: td
            md: |
              Set to `true` to align child elements to the bottom of the row
      - tag: tr
        children:
          - tag: td
            md: '`fill`'
          - tag: td
            md: |
              Set to `true` to make the row fill the width of the parent container.
      - tag: tr
        children:
          - tag: td
            md: '`gap`'
          - tag: td
            md: |
              Sets the gap beween child elements in the row in tenths of an LCARS unit (ex: gap: 1 will set a gap of 
              0.1 units)
      - tag: tr
        children:
          - tag: td
            md: '`height`'
          - tag: td
            md: |
              Sets height of the row in LCARS units
      - tag: tr
        children:
          - tag: td
            md: '`right`'
          - tag: td
            md: |
              Set to `true` to align child elements to the right side of the row
      - tag: tr
        children:
          - tag: td
            md: '`stretch`'
          - tag: td
            md: |
              Set to `true` to stretch child elements to the height of the row
