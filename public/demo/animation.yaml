children:
  - type: col
    marginTop: 1
    marginLeft: 1
    children:
      - type: sample
        content: |
          You can animate text using the `textAnimation` property to make the text appear as if it is being typed
          one character at a time.
        configYaml: |
          - type: el
            text: |
              This is text that will be animated to
              appear as if it is being typed one 
              character at a time.
            textAnimation:
              type: typing
              interval: 0.02
          - type: md
            content: |
              This even works with markdown.

              - Bullet 1
              - Bullet 2
              - Bullet 3
            textAnimation:
              type: typing
              delay: 3

  - type: panel-tl
    marginTop: 1
    leftWidth: 3
    leftStretch: true
    leftChildren:
      - type: menu-vertical
        mixin: menuItem
        rootPath: /demo/animation
    children:
      - type: md
        content: |
          You can apply animations to any element with the `animations` property. Use the `in` property of the
          animation to define an animation for when the element appears.
      - type: sample
        showForNav: /demo/animation/grow-all
        configYaml: |
          - type: el
            width: 5
            height: 5
            color: 1
            animations:
              in:
                - type: grow
                  duration: 0.5
      - type: sample
        showForNav: /demo/animation/grow-down
        configYaml: |
          - type: el
            width: 5
            height: 5
            color: 1
            animations:
              in:
                - type: grow-down
      - type: sample
        showForNav: /demo/animation/grow-up
        configYaml: |
          - type: el
            width: 5
            height: 5
            color: 1
            animations:
              in:
                - type: grow-up
      - type: sample
        showForNav: /demo/animation/grow-right
        configYaml: |
          - type: el
            width: 5
            height: 5
            color: 1
            animations:
              in:
                - type: grow-right
      - type: sample
        showForNav: /demo/animation/grow-left
        configYaml: |
          - type: el
            width: 5
            height: 5
            color: 1
            animations:
              in:
                - type: grow-left
      - type: sample
        showForNav: /demo/animation/children
        content: |
          Most elements that support children also support animating how those children appear. Currently, the only
          supported animation type is `build` which will make the children appear one at a time.
        configYaml: |
          - type: row
            gap: 1
            childrenAnimation:
              type: build
            children:
              - type: el
                text: Child 1
                color: 1
                width: 3
                textColor: black
                alignContent: middle-center
              - type: el
                text: Child 2
                color: 2
                width: 3
                textColor: black
                alignContent: middle-center
              - type: el
                text: Child 3
                color: 3
                width: 3
                textColor: black
                alignContent: middle-center

  - type: pill
    nav: /demo/components
    marginTop: 1
    marginLeft: 1
    text: 'Next: Components'
    width: 4
