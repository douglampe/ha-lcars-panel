children:
  - type: panel-tl
    title: Animation
    topGap: 1
    color: lilac
    fillTopLeft: false
    titleAnimation:
      type: typing
      delay: 1.5
    topAnimation:
      type: build-right
    topChildren:
      - type: el
        color: lilac
        width: 20
        animations:
          in:
            - type: grow-right
      - type: menu-horizontal
        mixin: menuTab
        gap: 1
        rootPath: /animation
        animations:
          in:
            - type: build-right
              delay: 0.5
              duration: 0.5
    children:
      - showForNav: /animation/text
        children:
          - type: sample
            content: |
              You can animate text using the `textAnimation` property to make the text appear as if it is being typed
              one character at a time.
            configYaml: |
              - type: el
                text: |
                  This is text that will be animated to
                  appear as if it is being typed one 
                  character at a time.
                textAnimation:
                  type: typing
                  duration: 0.025
              - type: md
                content: |
                  This even works with markdown.

                  - Bullet 1
                  - Bullet 2
                  - Bullet 3
                textAnimation:
                  type: typing
                  delay: 3
      - showForNav: /animation/element
        children:
          - type: md
            content: |
              You can apply animations to any element with the `animations` property. Use the `in` property of the
              animation to define an animation for when the element appears.
          - type: menu-horizontal
            mixin: menuTab
            gap: 1
            rootPath: /animation/element
            marginBottom: 1
            animations:
              in:
                - type: build-right
                  duration: 0.1
          - type: sample
            showForNav: /animation/element/grow-all
            configYaml: |
              - type: el
                width: 5
                height: 5
                color: 1
                animations:
                  in:
                    - type: grow
                      duration: 0.5
          - type: sample
            showForNav: /animation/element/grow-down
            configYaml: |
              - type: el
                width: 5
                height: 5
                color: 1
                animations:
                  in:
                    - type: grow-down
          - type: sample
            showForNav: /animation/element/grow-up
            configYaml: |
              - type: el
                width: 5
                height: 5
                color: 1
                animations:
                  in:
                    - type: grow-up
          - type: sample
            showForNav: /animation/element/grow-right
            configYaml: |
              - type: el
                width: 5
                height: 5
                color: 1
                animations:
                  in:
                    - type: grow-right
          - type: sample
            showForNav: /animation/element/grow-left
            configYaml: |
              - type: el
                width: 5
                height: 5
                color: 1
                animations:
                  in:
                    - type: grow-left
          - type: sample
            showForNav: /animation/element/children
            content: |
              Use element animation to animate child elements.
            configYaml: |
              - type: el
                animations:
                  in:
                    - type: grow
                      transformOrigin: top left
                children:
                  - type: panel-tl
