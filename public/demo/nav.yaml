children:
  - type: sample
    content: |
      Local navigation uses the `showForNav` key to have any item and its
      children visible only for certain navigation paths. The default navigation path is 
      `/home` so setting this value means the item will be visible by default but will
      be hidden when navigating to any path that does not start with `/home`.
    configYaml: |
      - type: row
        children:
          - type: pill
            text: Nav
            nav: /demo/nav/test
            color: golden-tainoi
          - type: el
            showForNav: /demo/nav/test
            marginLeft: 0.5
            pad: 0.2
            color: indian-red
            text: Khaaaan!!!!

  - type: sample
    content: |
      You can navigate via the browser by prefixing
      the value with `url:`.
    configYaml: |
      - type: col
        gap: 1
        children:
        - type: pill
          text: Google
          nav: url:https://google.com
          color: golden-tainoi
        - type: pill
          text: Root Path
          nav: url:/ha-lcars-panel
          color: golden-tainoi
        - tag: a
          name: foo
        - type: pill
          text: Anchor
          nav: url:#foo
          color: golden-tainoi

  - type: pill
    color: lilac
    nav: /demo/state
    text: HA State
