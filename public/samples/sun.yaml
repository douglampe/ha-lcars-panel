children:
  - type: panel-bl
    fillWidth: true
    fillHeight: true
    marginBottom: 0.2
    color: dodger-blue
    leftColor: dodger-blue
    bottomHeight: 0.5
    outerRadX: 3
    outerRadY: 1
    innerRadX: 2
    innerRadY: 1
    gap: 1
    leftChildren:
      - type: el
        text: LCARS 23295
        nav: 'url:/'
        color: lilac
        alignContent: bottom-right
        textColor: black
        height: 2
        button: true
      - type: el
        text: 01-23564
        color: dodger-blue
        fill: true
        alignContent: top-right
        textColor: black
        margin-bottom: -0.1
    bottomChildren:
      - type: el
        color: golden-tainoi
        width: 0.75
        height: 0.5
      - type: el
        color: lilac
        width: 4
        height: 0.5
      - type: el
        color: lilac
        width: 9
        height: 0.5
      - type: el
        color: indian-red
        width: 3
        height: 0.5
    children:
      - type: el
        text: Planetary Catelog Database 93-6636
        fill: true
        textColor: golden-tainoi
        fontSize: 1
        marginBottom: 0.5
        alignContent: top-right
      - type: row
        children:
          - type: col
            children:
              - type: table
                margin-left: 1
                animation: scanning
                fontSize: 0.5
                lineHeight: 0.6
                children:
                  - tag: tr
                    children:
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: temperature
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: dew_point
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: humidity
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: cloud_coverage
                  - tag: tr
                    children:
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: uv_index
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: pressure
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: wind_bearing
                      - tag: td
                        children:
                          - type: state-value
                            entity: weather.forecast_home
                            attribute: wind_speed
          - type: col
            config:
              fill: true
              right: true
            children:
              - type: row
                right: true
                margin-bottom: 0.3
                children:
                  - type: pill
                    text: 07-3215
                    color: dodger-blue
                    fontSize: 0.5
                    margin-right: 0.3
                  - type: pill
                    text: 03-4984
                    fontSize: 0.5
                    color: atomic-tangerine
              - type: row
                right: true
                children:
                  - type: pill
                    text: 08-2501
                    color: lilac
                    fontSize: 0.5
                    margin-right: 0.3
                  - type: pill
                    text: 04-2809
                    color: indian-red
                    fontSize: 0.5
  - type: panel-tl
    fillWidth: true
    fillHeight: true
    color: indian-red
    leftColor: indian-red
    leftPad: 1
    topHeight: 0.5
    outerRadX: 3
    innerRadX: 2
    innerRadY: 1
    topChildren:
      - type: el
        color: golden-tainoi
        height: .5
        width: .75
      - type: el
        color: atomic-tangerine
        width: 4
        height: 0.25
      - type: el
        color: lilac
        width: 9
        height: 0.5
      - type: el
        color: indian-red
        width: 3
        height: .5
    leftChildren:
      - type: el
        text: 02-24156
        color: indian-red
        height: 1
        alignContent: bottom-right
        textColor: black
      - type: el
        text: 03-41248
        color: indian-red
        height: 3
        alignContent: bottom-right
        textColor: black
      - type: el
        text: 04-14702
        color: golden-tainoi
        height: 1
        alignContent: bottom-right
        textColor: black
      - type: el
        text: 05-32456
        color: atomic-tangerine
        height: 3
        alignContent: top-right
        textColor: black
    children:
      - type: row
        wrap: true
        children:
          - type: col
            children:
              - type: el
                text: Sol
                textColor: golden-tainoi
                fontSize: 1
                marginBottom: 0.5
              - type: attribute-list
                entity: sun.sun
                textColor: lilac
                fontSize: 0.5
                animation: row-fill
          - type: col
            stretch: true
            children:
              - type: panel-all
                leftWidth: 1
                rightWidth: 1
                radXTopLeft: 2
                radXTopRight: 2
                radXBottomLeft: 2
                radXBottomRight: 2
                topHeight: 0.5
                bottomHeight: 0.5
                color: indian-red
                leftColor: indian-red
                rightColor: indian-red
                gap: 0
                marginLeft: 0.5
                fillWidth: false
                topChildren:
                  - type: el
                    color: indian-red
                    width: 1
                    height: 0.5
                  - type: el
                    color: transparent
                    fill: true
                    height: 1
                  - type: el
                    color: indian-red
                    width: 1
                    height: 0.5
                bottomChildren:
                  - type: el
                    color: indian-red
                    width: 1
                    height: 0.5
                  - type: el
                    color: transparent
                    fill: true
                    height: 1
                  - type: el
                    color: indian-red
                    width: 1
                    height: 0.5
                children:
                  - tag: img
                    src: https://www.nasa.gov/wp-content/uploads/2016/07/10f0.15.gif?w=500
                    style:
                      width: calc(var(--lcars-unit) * 8)
                      marginLeft: calc(var(--lcars-unit) * 2)
                      marginRight: calc(var(--lcars-unit) * 2)
